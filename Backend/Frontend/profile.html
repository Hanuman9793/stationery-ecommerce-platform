<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Stationery Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .profile-container {
            max-width: 600px;
            margin: 2rem auto;
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
        }
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--accent-gold);
            color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 700;
        }
        .profile-info h2 { margin-bottom: 0.2rem; }
        .profile-info p { color: var(--text-muted); }
        .profile-badge {
            display: inline-block;
            padding: 4px 8px;
            background: var(--bg-surface-hover);
            border-radius: 4px;
            font-size: 0.8rem;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-gold);
            font-weight: bold;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--bg-surface);
            padding: 1.5rem;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: 0.3s;
        }
        .stat-card:hover { border-color: var(--accent-gold); }
        .stat-card i { font-size: 2rem; color: var(--accent-gold); margin-bottom: 10px; }
        .stat-card h3 { margin-bottom: 5px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="nav-logo">
                <i class="fas fa-pen-nib"></i> Ink<span>&</span>Paper
            </a>
            <div class="nav-links" id="auth-links"></div>
        </div>
    </nav>

    <main class="container">
        <div class="profile-container glass-card mb-4" style="padding: 2rem;">
            <div id="loading" class="loader"></div>
            <div id="profile-content" style="display: none;">
                <div class="profile-header">
                    <div class="profile-avatar" id="profile-initial">?</div>
                    <div class="profile-info">
                        <h2 id="profile-name">User Name</h2>
                        <p id="profile-email">email@example.com</p>
                        <div class="profile-badge" id="profile-role">User</div>
                    </div>
                </div>

                <div class="stats-grid">
                    <a href="orders.html" class="stat-card">
                        <i class="fas fa-box-open"></i>
                        <h3>My Orders</h3>
                        <p class="text-muted">Track & view history</p>
                    </a>
                    <a href="wishlist.html" class="stat-card">
                        <i class="fas fa-heart"></i>
                        <h3>Wishlist</h3>
                        <p class="text-muted" id="wishlist-count">Items saved</p>
                    </a>
                </div>

                <button onclick="logout()" class="btn btn-danger" style="width: 100%;"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
            </div>
            <div id="error-message" class="text-danger text-center mt-2"></div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Ink&Paper Stationery Shop. Built with Node.js & Vanilla JS.</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
