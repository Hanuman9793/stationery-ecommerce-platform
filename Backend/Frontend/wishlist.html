<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist | Stationery Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        
        /* reuse product grid but small tweaks if needed */
        .remove-wishlist-btn {
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="nav-logo">
                <i class="fas fa-pen-nib"></i> Ink<span>&</span>Paper
            </a>
            <div class="nav-links" id="auth-links"></div>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h2><i class="fas fa-heart text-danger"></i> My Wishlist</h2>
            <a href="index.html" class="btn btn-outline">Continue Shopping</a>
        </div>
        
        <div id="loading" class="loader"></div>
        <div id="error-message" class="text-danger text-center"></div>
        
        <div id="empty-state" class="text-center" style="display: none; padding: 4rem 0;">
            <i class="far fa-heart" style="font-size: 4rem; color: var(--border-color); margin-bottom: 1rem;"></i>
            <h3>Your wishlist is empty</h3>
            <p class="text-muted mt-1 mb-2">Save items you like to view them later.</p>
            <a href="index.html" class="btn btn-primary">Browse Products</a>
        </div>
        
        <div class="grid grid-cols-4 gap-2" id="wishlist-container" style="display: none;">
            <!-- Wishlist cards injected here -->
        </div>

    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Ink&Paper Stationery Shop. Built with Node.js & Vanilla JS.</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/wishlist.js"></script>
</body>
</html>
