<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Ink&Paper</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body { margin: 0; display: flex; flex-direction: column; overflow-x: hidden; }
        .split-layout { display: flex; min-height: calc(100vh - 80px); }
        
        .split-image-container {
            flex: 1; position: relative; display: none; overflow: hidden;
        }
        
        .split-image-bg {
            position: absolute; top:0; left:0; right:0; bottom:0;
            background: url('https://images.unsplash.com/photo-1583485088034-697b5a62f561?auto=format&fit=crop&w=1200&q=80') center/cover no-repeat;
            animation: slowPan 25s infinite alternate ease-in-out;
            transform: scale(1.1);
        }
        @keyframes slowPan { 0% { transform: scale(1.1) translate(0, 0); } 100% { transform: scale(1.1) translate(-2%, 2%); } }

        .split-overlay {
            position: absolute; top:0; left:0; right:0; bottom:0;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9) 0%, rgba(15, 23, 42, 0.3) 100%);
            display: flex; flex-direction: column; justify-content: center; padding: 4rem; color: #fff;
        }
        .split-overlay h1 { font-size: 4rem; margin-bottom: 1rem; line-height: 1.1; }
        .text-gold { color: #f59e0b; }

        .split-form-container {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 2rem; background: var(--bg-main);
        }
        
        .auth-card {
            width: 100%; max-width: 450px; background: var(--bg-surface);
            padding: 3rem 2.5rem; border-radius: var(--radius-lg); border: 1px solid var(--border-color);
            box-shadow: var(--shadow-hover);
            animation: formSlideUp 0.6s ease forwards;
        }

        @keyframes formSlideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .auth-header { text-align: center; margin-bottom: 2rem; }
        
        /* Tab Switcher */
        .tab-switcher { display: flex; background: var(--bg-surface-hover); border-radius: 30px; margin-bottom: 2rem; position: relative; padding: 4px; }
        .tab-switcher-btn { flex: 1; text-align: center; padding: 10px; z-index: 2; cursor: pointer; color: var(--text-muted); font-weight: 600; transition: 0.3s; border-radius: 30px; }
        .tab-switcher-btn.active { color: var(--text-main); }
        
        .slider-pill { position: absolute; top: 4px; left: 4px; width: calc(50% - 4px); height: calc(100% - 8px); background: var(--bg-surface); border-radius: 30px; box-shadow: var(--shadow-soft); transition: transform 0.4s ease; z-index: 1; }
        .state-register .slider-pill { transform: translateX(100%); }

        /* Absolute Panel Stacking for safe reliable visibility */
        .forms-container { position: relative; overflow: hidden; min-height: 380px; }
        .auth-slide { position: absolute; top: 0; left: 0; width: 100%; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease; }
        
        /* Login State */
        #login-view { transform: translateX(0); opacity: 1; }
        #register-view { transform: translateX(100%); opacity: 0; pointer-events: none; }
        
        /* Register State */
        .state-register #login-view { transform: translateX(-100%); opacity: 0; pointer-events: none; }
        .state-register #register-view { transform: translateX(0); opacity: 1; pointer-events: auto; }

        @media (min-width: 900px) {
            .split-image-container { display: block; }
            .split-form-container { flex: 0 0 500px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="nav-logo">
                <i class="fas fa-pen-nib"></i> Ink<span>&</span>Paper
            </a>
            <a href="index.html" class="btn btn-outline" style="padding: 0.5rem 1rem;"><i class="fas fa-arrow-left"></i> Home</a>
        </div>
    </nav>

    <div class="split-layout">
        <!-- Visual Presentation -->
        <div class="split-image-container">
            <div class="split-image-bg"></div>
            <div class="split-overlay">
                <h1>Elevate Your<br><span class="text-gold">Workspace.</span></h1>
                <p>Join thousands of professionals securing premium stationery, elegant writing instruments, and curated desk accessories.</p>
            </div>
        </div>

        <!-- Forms -->
        <div class="split-form-container">
            <div class="auth-card" id="auth-state-wrap">
                
                <div class="auth-header">
                    <h2 id="dynamic-title">Welcome Back</h2>
                    <p class="text-muted" id="dynamic-desc">Sign in to your account</p>
                </div>

                <div class="tab-switcher">
                    <div class="slider-pill"></div>
                    <div class="tab-switcher-btn active" id="tab-login" onclick="slideTab('login')">SignIn</div>
                    <div class="tab-switcher-btn" id="tab-register" onclick="slideTab('register')">SignUp</div>
                </div>

                <!-- Fix: Height constrained relative wrapper, safe absolute panning -->
                <div class="forms-container">
                    
                    <!-- LOGIN -->
                    <div class="auth-slide" id="login-view">
                        <form id="login-form">
                            <div class="form-group">
                                <label class="form-label">Email Address</label>
                                <input type="email" id="login-email" class="form-control" placeholder="name@example.com" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Password</label>
                                <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
                            </div>
                            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 1rem;" id="login-btn">
                                Sign In <i class="fas fa-arrow-right"></i>
                            </button>
                            <div id="login-error" class="text-danger mt-2 text-center" style="font-size: 0.9rem; font-weight:600;"></div>
                        </form>
                    </div>

                    <!-- REGISTER -->
                    <div class="auth-slide" id="register-view">
                        <form id="register-form">
                            <div class="form-group">
                                <label class="form-label">Full Name</label>
                                <input type="text" id="reg-name" class="form-control" placeholder="John Doe" required minlength="3">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Email Address</label>
                                <input type="email" id="reg-email" class="form-control" placeholder="new@example.com" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Password</label>
                                <input type="password" id="reg-password" class="form-control" placeholder="Create a password (min 6)" required minlength="6">
                            </div>
                            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 1rem;" id="reg-btn">
                                Create Account <i class="fas fa-user-plus"></i>
                            </button>
                            <div id="reg-error" class="text-danger mt-2 text-center" style="font-size: 0.9rem; font-weight:600;"></div>
                        </form>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Simple and robust interactivity
        function slideTab(tab) {
            const wrap = document.getElementById('auth-state-wrap');
            const title = document.getElementById('dynamic-title');
            const desc = document.getElementById('dynamic-desc');
            const lBtn = document.getElementById('tab-login');
            const rBtn = document.getElementById('tab-register');

            if(tab === 'login') {
                wrap.classList.remove('state-register');
                lBtn.classList.add('active'); 
                rBtn.classList.remove('active');
                
                title.style.opacity = 0; desc.style.opacity = 0;
                setTimeout(() => { title.innerText = 'Welcome Back'; desc.innerText = 'Sign in to your account'; title.style.opacity = 1; desc.style.opacity = 1; }, 200);
            } else {
                wrap.classList.add('state-register');
                rBtn.classList.add('active'); 
                lBtn.classList.remove('active');
                
                title.style.opacity = 0; desc.style.opacity = 0;
                setTimeout(() => { title.innerText = 'Join Us'; desc.innerText = 'Create an account to begin'; title.style.opacity = 1; desc.style.opacity = 1; }, 200);
            }
        }
    </script>
</body>
</html>
